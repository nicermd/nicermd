name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core
        # Website typecheck imports `nicermd-core` types from its dist/
        # output, so the core must be built before any downstream
        # typecheck or test pass runs.
        run: pnpm --filter nicermd-core build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Audit (production)
        run: pnpm audit --prod

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies
        working-directory: packages/website/src-tauri
        # `--deny warnings` escalates unmaintained / unsound /
        # yanked findings to errors. Known-acceptable advisories
        # are ignored via packages/website/src-tauri/.cargo/audit.toml
        # so any NEW warning fails the build until it is either
        # fixed or added to that file with rationale.
        run: cargo audit --deny warnings

      - name: Verify THIRD-PARTY-LICENSES.md is current
        run: |
          pnpm licenses:gen
          git diff --exit-code THIRD-PARTY-LICENSES.md || {
            echo "::error::THIRD-PARTY-LICENSES.md is out of date — run 'pnpm licenses:gen' locally and commit the result."
            exit 1
          }
